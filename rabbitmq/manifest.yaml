 #RABBITMQ_DEFAULT_USER: roboshop
 #RABBITMQ_DEFAULT_PASS: roboshop123
apiVersion: v1
kind: Secret
metadata:
 name: rabbitmq
 namespace: roboshop
type: opaque
data:
  RABBITMQ_DEFAULT_USER: cm9ib3Nob3AK
  RABBITMQ_DEFAULT_PASS: cm9ib3Nob3AxMjMK
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: rabbitmq
  template:
    metadata:
      labels:
       project: roboshop
       tier: db
       component: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: sravani3093/rabbitmq:4.0.0
        envFrom:
        - secretRef:
            name: rabbitmq
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: rabbitmq
spec:
  selector:
    project: roboshop
    tier: db
    component: rabbitmq
  ports:
    - protocol: TCP
      port: 6379 #service port
      targetPort: 6379 #container port