apiVersion: v1
kind: Secret
metadata:
 name: mysql
type: opaque
data:
 MYSQL_ALLOW_EMPTY_PASSWORD: "eWVzCg=="
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: mysql
  template:
    metadata:
      labels:
       project: roboshop
       tier: db
       component: mysql
    spec:
      containers:
      - name: mysql
        image: sravani3093/mysql:4.0.0
        envFrom:
         - secretRef:
             name: mysql
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  selector:
    project: roboshop
    tier: db
    component: mysql
  ports:
    - protocol: TCP
      port: 3306 #service port
      targetPort: 3306 #container port